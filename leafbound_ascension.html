  function showCreate(i){let pick=0;dom.mainWindow.innerHTML=`<div class="eyebrow">CHARACTER CREATION</div><h2>Choose your adventurer</h2><p>Every path begins as a Novice. Your appearance is cosmetic; your job is earned in the Grotto.</p><div class="form-grid"><div class="field full"><label for="nameInput">Adventurer name</label><input id="nameInput" maxlength="16" autocomplete="off" placeholder="Enter a name"></div><div class="field full"><label>Field look</label><div class="look-grid">${playerSheets.map((k,n)=>`<button class="look ${n===0?'selected':''}" data-look="${n}" type="button"><i style="${spriteStyle(n)}"></i><span>${['EMBER','FERN','RIVER','DUSK'][n]}</span></button>`).join('')}</div></div></div><div class="actions"><button class="pixel-btn primary" id="createHero">BEGIN</button><button class="pixel-btn" id="backSelect">BACK</button></div>`;const inputEl=$('nameInput'),createButton=$('createHero');inputEl.focus();inputEl.addEventListener('keydown',event=>{if(event.key==='Enter'){event.preventDefault();createButton.click()}});dom.mainWindow.querySelectorAll('[data-look]').forEach(b=>b.onclick=()=>{pick=+b.dataset.look;dom.mainWindow.querySelectorAll('.look').forEach(x=>x.classList.toggle('selected',x===b))});$('backSelect').onclick=showSelect;createButton.onclick=()=>{const name=inputEl.value.trim().replace(/\s+/g,' ');if(name.length<2){inputEl.focus();inputEl.setAttribute('placeholder','Use at least 2 characters');return}saves[i]=normalize({name,appearance:pick});persist();startHero(i)}}

  function transitionMap(to,initial=false,connected=false){const from=mapKey,m=maps[to];let spawn;if(initial&&hero.lastMap===to&&Number.isFinite(hero.x))spawn={x:clamp(hero.x,100,m.width-100),y:clamp(hero.y,100,530)};else if(connected){const entry=m.portals.find(p=>p.to===from);if(entry){const entersFromLeft=entry.x+entry.w/2<m.width/2;spawn={x:entersFromLeft?entry.x+entry.w+55:entry.x-hero.w-55,y:m.ground-hero.h}}}spawn=spawn||m.spawn;mapKey=to;hero.x=clamp(spawn.x,0,m.width-hero.w);hero.y=spawn.y;hero.vx=hero.vy=0;hero.hp=Math.max(1,hero.hp);camera.x=clamp(hero.x-viewW*.35,0,Math.max(0,m.width-viewW));enemies=[];drops=[];projectiles=[];enemyProjectiles=[];effects=[];texts=[];spawnClock=0;if(m.grind)seedGrindMap();saveHero();updateHud();if(!initial)showToast(m.name);sound('portal')}

  function spawnEnemy(initial=false){const m=maps[mapKey];if(enemies.filter(e=>!e.dead).length>=m.enemyCap)return;const surface=chooseSpawnSurface(initial);if(!surface)return;const left=surface.x+10,right=surface.x+surface.w-62;let x=rand(left,Math.max(left+1,right));if(initial&&Math.abs(surface.y-(hero.y+hero.h))<68&&Math.abs(x-hero.x)<260)x=Math.abs(left-hero.x)>Math.abs(right-hero.x)?left:right;const highland=mapKey==='highlands',roll=Math.random(),wardenCount=enemies.filter(e=>!e.dead&&e.type==='skeleton').length;let type;if(highland)type=roll<.65?'orc':roll<.85?'pig':wardenCount<6?'skeleton':'orc';else type=x>2400&&wardenCount<3&&roll>.94?'skeleton':roll<(x<1600?.72:.5)?'slime':'pig';const elite=highland&&Math.random()<.16,d=enemyDefs[type],mobScale=m.mobScale||1,w=d.w+(elite?8:0),h=d.h+(elite?6:0),patrolMin=surface.x+8,patrolMax=Math.max(surface.x+9,surface.x+surface.w-w-8),maxHp=Math.round(d.hp*mobScale*(elite?1.65:1));enemies.push({type,elite,x:clamp(x,patrolMin,patrolMax),y:surface.y-h,w,h,vx:0,dir:Math.random()<.5?-1:1,hp:maxHp,maxHp,attack:Math.round(d.attack*mobScale*(elite?1.25:1)),rewardXp:Math.round(d.xp*mobScale*(elite?1.8:1)),leavesMult:mobScale*(elite?2.2:1),invuln:0,hurt:0,attackCd:rand(.8,1.5),charge:0,dead:false,deadTime:0,anim:rand(0,2),lastHit:-1,surfaceId:surface.id,floorY:surface.y,patrolMin,patrolMax})}
  function usePotion(kind){if(!hero||paused)return;if(kind==='red'){if(hero.red<=0)return showToast('No Bloom Tonics.');if(hero.hp>=maxHp())return showToast('HP is already full.');hero.red--;hero.hp=Math.min(maxHp(),hero.hp+Math.floor(maxHp()*.5));showToast('Bloom Tonic restored HP.');sound('heal');addEffect(hero.x+hero.w/2,hero.y+20,3)}else{if(hero.blue<=0)return showToast('No Moondew.');if(hero.mp>=maxMp())return showToast('MP is already full.');hero.blue--;hero.mp=Math.min(maxMp(),hero.mp+Math.floor(maxMp()*.55));showToast('Moondew restored MP.');sound('heal');addEffect(hero.x+hero.w/2,hero.y+20,2)}updateHud();saveHero()}

  function attemptAttack(){if(!hero||paused||hero.attackTimer>0||hero.dashTimer>0)return;hero.combo=hero.comboWindow>0?(hero.combo%3)+1:1;hero.comboWindow=.42;hero.attackDuration=hero.combo===3?.41:.31;hero.attackTimer=hero.attackDuration;hero.attackHit=false;sound('swing');if(isRanged()){const magic=['Arcanist','Starcaller'].includes(hero.job),falcon=hero.job==='Falconer',star=hero.job==='Starcaller',cost=magic?3:0;if(hero.mp<cost){hero.attackTimer=0;showToast('Not enough MP.');return}hero.mp-=cost;launchProjectile({x:hero.x+hero.w/2+hero.facing*24,y:hero.y+34,vx:hero.facing*(magic?590:720),vy:0,w:magic?20:28,h:magic?20:14,damage:power()*(magic?1.1:1),magic,falcon,star,pierce:magic||falcon?1:0,range:falcon?780:magic?640:720,homeRadius:falcon?310:magic?280:250,turnRate:falcon?9:magic?9:7});updateHud()}}

  function meleeStrike(){const reach=hero.combo===3?96:76,box={x:hero.facing>0?hero.x+hero.w-4:hero.x-reach+4,y:hero.y+5,w:reach,h:50};let hits=0;enemies.forEach(e=>{if(!e.dead&&overlap(box,e)&&damageEnemy(e,power()*(hero.combo===3?1.45:1),hero.combo===3?'FINISHER':'STRIKE'))hits++});addEffect(hero.x+hero.w/2+hero.facing*45,hero.y+26,hits?0:6,.38);if(hits){if(hero.job==='Ironwarden'){const before=hero.guard;hero.guard=clamp(hero.guard+hits,0,3);if(hero.guard>before){text(hero.x+hero.w/2,hero.y-12,`GUARD ${hero.guard}/3`,'#ffd873');addEffect(hero.x+hero.w/2,hero.y+28,4,.45)}}shake=Math.max(shake,hero.combo===3?8:4);sound('hit')}}
  function attemptSkill(){if(!hero||paused)return;if(hero.job==='Novice')return showToast('Reach level 10 and visit Vale to unlock a job skill.');if(hero.skillCd>0)return;if(hero.job==='Starcaller'&&hero.constellation<3)return showToast(`Build the constellation with arcane hits: ${hero.constellation} / 3.`);const cost={Ironwarden:20,Falconer:18,Starcaller:22}[hero.job]||14;if(hero.mp<cost)return showToast('Not enough MP.');hero.mp-=cost;
    if(hero.job==='Ironwarden'){hero.skillCd=4.8;hero.guard=3;hero.fortify=5.5;damageCircle(hero.x+hero.w/2,hero.y+hero.h/2,185,power()*2.25,'QUAKE CROWN');addEffect(hero.x+hero.w/2,hero.y+30,4,1.0);text(hero.x+hero.w/2,hero.y-18,'FORTIFIED','#ffd873');shake=14}

  function drawForestPlatform(p){for(let x=p.x;x<p.x+p.w;x+=48){const sourceX=x===p.x?16:x>=p.x+p.w-48?48:32;ctx.drawImage(assets.forestTiles,sourceX,0,16,16,x,p.y,48,48)}if(p.decor)ctx.drawImage(assets.forestTiles,64,0,16,32,p.x+p.w-72,p.y-96,48,96)}
  function drawCaveGround(m){const start=Math.floor((camera.x-48)/48)*48,end=camera.x+viewW+96;for(let x=start;x<end;x+=48){ctx.drawImage(assets.caveTiles,32,0,16,16,x,m.ground,48,48);ctx.drawImage(assets.caveTiles,32,16,16,16,x,m.ground+48,48,48);ctx.drawImage(assets.caveTiles,32,16,16,16,x,m.ground+96,48,48)}}
  function drawCavePlatform(p){ctx.drawImage(assets.caveTiles,16,13,16,19,p.x,p.y,48,48);for(let x=p.x+48;x<p.x+p.w-48;x+=48)ctx.drawImage(assets.caveTiles,32,13,16,19,x,p.y,48,48);ctx.drawImage(assets.caveTiles,48,13,16,19,p.x+p.w-48,p.y,48,48)}
  function drawHazard(h){if(h.kind==='rune'){const active=hazardActive(h),frame=Math.floor(clock*12)%11,pulse=.75+Math.sin(clock*7+h.phase)*.2;ctx.save();ctx.globalAlpha=active?.95:.35;ctx.strokeStyle=active?'#d79cff':'#77618f';ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(h.x+h.w/2,h.y+35,h.w/2*pulse,11*pulse,0,0,Math.PI*2);ctx.stroke();ctx.fillStyle=active?'rgba(163,104,255,.32)':'rgba(90,68,130,.16)';ctx.fillRect(h.x,h.y+30,h.w,7);drawFrame(assets.fx,64,64,frame,5,h.x-12,h.y-42,96,96,false,active?.9:.3);ctx.restore()}else{const frame=Math.floor(clock*8)%5;for(let x=h.x;x<h.x+h.w;x+=48)drawFrame(assets.spikes,16,16,frame,0,x,h.y-16,48,48)}}
  function drawWorld(m){if(m.theme==='forest'){drawForestGround(m);m.platforms.forEach(drawForestPlatform)}else if(m.theme==='highlands'){drawHighlandGround(m);m.platforms.forEach(drawCavePlatform)}else if(m.theme==='cave'){drawCaveGround(m);m.platforms.forEach(drawCavePlatform)}else{drawTownGround(m);m.platforms.forEach(p=>drawFrame(assets.movingPlatform,32,8,0,0,p.x,p.y,p.w,32))}
    m.hazards.forEach(drawHazard);m.portals.forEach(drawPortal);m.npcs.forEach(drawNpc)}
  function drawPortal(p){const row=p.to==='forest'?3:p.to==='job'?6:p.to==='highlands'?5:2,frame=Math.floor(clock*12)%11;drawFrame(assets.fx,64,64,frame,row,p.x-26,p.y-22,128,128);worldLabel(p.x+p.w/2,p.y-25,p.label.toUpperCase())}
  function drawNpc(n){drawActorFrame(assets[n.key],0,n.x,n.y+56,144);worldLabel(n.x,n.y-8,`${n.name.toUpperCase()} / ${n.title.toUpperCase()}`)}
  function worldLabel(x,y,value){ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.lineWidth=5;ctx.strokeStyle='#080b13';ctx.strokeText(value,x,y);ctx.fillStyle='#fff0c7';ctx.fillText(value,x,y)}
  function drawEnemies(){for(const e of enemies){const d=enemyDefs[e.type],deadAlpha=e.dead?clamp(e.deadTime/.62,0,1):1;let col=Math.floor(e.anim*(e.charge>0?12:6))%d.frames;if(Math.abs(e.vx)<5)col=0;if(e.dead&&e.type==='slime')col=Math.min(3,Math.floor((1-e.deadTime/.62)*4));else if(e.dead)col=0;const image=e.dead&&e.type==='slime'?assets.slimeDeath:assets[d.sheet],renderScale=d.scale*(e.elite?1.12:1);if(e.elite&&!e.dead){drawFrame(assets.fx,64,64,Math.floor(clock*10)%11,5,e.x+e.w/2-52,e.floorY-88,104,104,false,.35);ctx.save();ctx.globalAlpha=.75;ctx.strokeStyle='#f4c86b';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(e.x+e.w/2,e.floorY-3,e.w*.62,7,0,0,Math.PI*2);ctx.stroke();ctx.restore()}drawActorFrame(image,col,e.x+e.w/2,e.y+e.h+(e.dead?10*(1-deadAlpha):0),renderScale,e.dir<0,deadAlpha*(e.hurt>0?.62:1));if(e.elite&&!e.dead)worldLabel(e.x+e.w/2,e.y-18,'ELITE');if(e.hp<e.maxHp&&!e.dead){ctx.fillStyle=e.elite?'#5a4010':'#090c14';ctx.fillRect(e.x-2,e.y-12,e.w+4,7);ctx.fillStyle=e.elite?'#f3bd4f':'#e55060';ctx.fillRect(e.x,e.y-10,e.w*clamp(e.hp/e.maxHp,0,1),3)}}}
  function drawClassAura(p){const cx=p.x+p.w/2,cy=p.y+p.h/2;if(p.job==='Ironwarden'&&(p.guard>0||p.fortify>0)){ctx.save();ctx.globalAlpha=p.fortify>0?.75:.48;ctx.strokeStyle=p.fortify>0?'#ffd873':'#8eb8d9';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(cx,p.y+p.h-4,30,9,0,0,Math.PI*2);ctx.stroke();for(let i=0;i<p.guard;i++){ctx.fillStyle='#ffd873';ctx.fillRect(cx-11+i*9,p.y-10,6,4)}ctx.restore()}else if(p.job==='Falconer'&&p.falconMarks>0){ctx.save();ctx.fillStyle='#ffe08a';for(let i=0;i<p.falconMarks;i++){const a=clock*3+i*Math.PI*2/3;ctx.beginPath();ctx.arc(cx+Math.cos(a)*24,cy+Math.sin(a)*13,3,0,Math.PI*2);ctx.fill()}ctx.restore()}else if(p.job==='Starcaller'){if(p.novaTimer>0)drawFrame(assets.fx,64,64,Math.floor(clock*12)%11,7,cx-76,cy-76,152,152,false,.48);else if(p.constellation>0){ctx.save();ctx.fillStyle='#b9d7ff';for(let i=0;i<p.constellation;i++){const a=clock*2+i*Math.PI*2/3;ctx.beginPath();ctx.arc(cx+Math.cos(a)*25,cy+Math.sin(a)*16,3,0,Math.PI*2);ctx.fill()}ctx.restore()}}}
  function drawPlayer(){const p=hero;if(!p)return;drawClassAura(p);let col=0;if(p.hurt>0)col=8;else if(!p.onGround)col=7;else if(Math.abs(p.vx)>30)col=1+Math.floor(p.anim*9)%6;const alpha=p.invuln>0&&Math.floor(p.invuln*18)%2===0?.42:1;drawActorFrame(assets[playerSheets[p.appearance]],col,p.x+p.w/2,p.y+p.h,144,p.facing<0,alpha)}
  function drawProjectiles(){for(const q of projectiles){if(q.magic)drawFrame(assets.fx,64,64,Math.floor(clock*14)%11,2,q.x-24,q.y-24,48,48,q.vx<0);else{ctx.save();ctx.translate(q.x,q.y);if(q.vx<0)ctx.scale(-1,1);ctx.rotate(Math.atan2(q.vy,Math.abs(q.vx))+Math.PI/2);drawFrame(assets.spear,16,32,Math.floor(clock*12)%12,0,-16,-16,32,32);ctx.restore()}}for(const q of enemyProjectiles){ctx.save();ctx.translate(q.x,q.y);ctx.rotate(Math.atan2(q.vy,q.vx));drawFrame(assets.orcBullet,48,32,0,0,-18,-12,36,24);ctx.restore()}}
  function drawDrops(){for(const d of drops){const bob=Math.sin(clock*7+d.x)*3;if(d.type==='leaves')drawFrame(assets.caveTiles,16,16,Math.floor(clock*7)%4,1,d.x-12,d.y-13+bob,24,24);else if(d.type==='red')drawFrame(assets.caveTiles,16,16,Math.floor(clock*7)%4,2,d.x-13,d.y-14+bob,26,26);else drawFrame(assets.fx,64,64,Math.floor(clock*12)%11,2,d.x-19,d.y-20+bob,38,38)}}
  function drawEffects(){for(const f of effects){if(f.kind==='after'){const alpha=f.life/f.max*.25;drawActorFrame(assets[playerSheets[f.appearance]],0,f.x+19,f.y+56,128,f.facing<0,alpha)}else{const progress=1-f.life/f.max,col=Math.min(10,Math.floor(progress*11));const size=90+(1-progress)*25;drawFrame(assets.fx,64,64,col,f.row,f.x-size/2,f.y-size/2,size,size)}}}
  function drawTexts(){ctx.save();ctx.translate(-Math.round(camera.x),0);ctx.textAlign='center';ctx.font='bold 15px Courier New';for(const t of texts){ctx.globalAlpha=clamp(t.life/t.max,0,1);ctx.lineWidth=5;ctx.strokeStyle='#080b12';ctx.strokeText(t.value,t.x,t.y);ctx.fillStyle=t.color;ctx.fillText(t.value,t.x,t.y)}ctx.restore();ctx.globalAlpha=1}
  function drawPrompt(){if(!currentInteract||paused){dom.prompt.classList.remove('show');return}dom.prompt.textContent=currentInteract.type==='portal'?`[ E ] ENTER ${currentInteract.data.label.toUpperCase()}`:`[ E ] TALK TO ${currentInteract.data.name.toUpperCase()}`;dom.prompt.classList.add('show')}
  function render(){const m=maps[mapKey]||maps.town,scale=canvas.height/VIEW_H;ctx.setTransform(scale,0,0,scale,0,0);drawParallax(m);ctx.save();const sx=shake?rand(-shake,shake):0,sy=shake?rand(-shake*.45,shake*.45):0;ctx.translate(-Math.round(camera.x)+sx,sy);drawWorld(m);drawDrops();drawEnemies();drawProjectiles();drawEffects();drawPlayer();ctx.restore();drawTexts();drawPrompt()}

  function mechanicLabel(){if(hero.job==='Ironwarden')return `IRON GUARD ${hero.guard}/3${hero.fortify>0?` · FORTIFIED ${hero.fortify.toFixed(1)}s`:''}`;if(hero.job==='Falconer')return `FALCON MARK ${hero.falconMarks}/3 · THIRD HIT DIVES`;if(hero.job==='Starcaller')return hero.novaTimer>0?`NOVA FIELD ${hero.novaTimer.toFixed(1)}s`:`CONSTELLATION ${hero.constellation}/3 · ARCANE HITS CHARGE`;return ''}
  function updateHud(){
    if(!hero)return;const hp=maxHp(),mp=maxMp(),xp=xpNeed(hero.level),m=maps[mapKey];
    dom.heroName.textContent=hero.name;dom.heroMeta.textContent=`LV. ${hero.level} ${hero.job.toUpperCase()}`;dom.portrait.style.backgroundImage=`url(${assetSources[playerPortraits[hero.appearance]]})`;
    dom.hpFill.style.width=`${clamp(hero.hp/hp*100,0,100)}%`;dom.mpFill.style.width=`${clamp(hero.mp/mp*100,0,100)}%`;dom.xpFill.style.width=`${clamp(hero.xp/xp*100,0,100)}%`;
    dom.hpText.textContent=`${Math.ceil(hero.hp)} / ${hp}`;dom.mpText.textContent=`${Math.floor(hero.mp)} / ${mp}`;dom.xpText.textContent=`${hero.xp} / ${xp}`;dom.mechanicText.textContent=mechanicLabel();
    dom.mapName.textContent=m.name;dom.mapSub.textContent=m.sub;dom.bountyText.textContent=`FIELD CONTRACT T${hero.bountyTier}: ${hero.bountyKills} / ${hero.bountyTarget}`;dom.currencyText.textContent=`${hero.leaves} LEAVES`;
    dom.skillSlot.querySelector('span').textContent=jobInfo[hero.job]?.skill||'SKILL';dom.skillSlot.classList.toggle('cool',hero.skillCd>0||hero.job==='Novice'||hero.job==='Starcaller'&&hero.constellation<3);dom.dashSlot.classList.toggle('cool',hero.dashCd>0);dom.redCount.textContent=`${hero.red} TONIC`;dom.blueCount.textContent=`${hero.blue} DEW`;
    canvas.dataset.playerState=JSON.stringify({map:mapKey,x:Math.round(hero.x),y:Math.round(hero.y),job:hero.job,guard:hero.guard,fortify:+hero.fortify.toFixed(2),falconMarks:hero.falconMarks,constellation:hero.constellation,nova:+hero.novaTimer.toFixed(2),onGround:hero.onGround,onPlatform:hero.onPlatform,enemies:enemies.filter(e=>!e.dead).length,types:Object.fromEntries(['slime','pig','orc','skeleton'].map(type=>[type,enemies.filter(e=>!e.dead&&e.type===type).length])),hurt:enemies.filter(e=>!e.dead&&e.hp<e.maxHp).slice(0,6).map(e=>({type:e.type,x:Math.round(e.x),y:Math.round(e.y),hp:Math.round(e.hp),maxHp:e.maxHp})),playerProjectiles:projectiles.length,enemyProjectiles:enemyProjectiles.length})
  }
  function resize(){const r=canvas.getBoundingClientRect(),dpr=Math.min(devicePixelRatio||1,2);canvas.width=Math.max(1,Math.floor(r.width*dpr));canvas.height=Math.max(1,Math.floor(r.height*dpr));viewW=clamp(VIEW_H*(canvas.width/canvas.height),320,1920);ctx.imageSmoothingEnabled=false}addEventListener('resize',resize);resize();

  function sound(type){if(muted)return;try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain(),now=audioCtx.currentTime;const cfg={start:[420,620,.12],jump:[250,410,.08],swing:[180,110,.06],hit:[90,55,.08],hurt:[130,65,.16],defeat:[190,70,.18],pickup:[620,900,.08],heal:[480,760,.2],skill:[260,760,.28],dash:[110,240,.08],buy:[520,690,.1],portal:[220,520,.35],level:[440,880,.45]}[type]||[220,330,.1];o.type=['hurt','hit','defeat'].includes(type)?'square':'triangle';o.frequency.setValueAtTime(cfg[0],now);o.frequency.exponentialRampToValueAtTime(cfg[1],now+cfg[2]);g.gain.setValueAtTime(.045,now);g.gain.exponentialRampToValueAtTime(.001,now+cfg[2]);o.connect(g).connect(audioCtx.destination);o.start(now);o.stop(now+cfg[2])}catch{}}
  function toggleMenu(){if(!hero)return;if(dom.modalOverlay.classList.contains('show'))return closeModal();paused=true;openModal(`<div class="eyebrow">FIELD MENU</div><h2>${escapeHtml(hero.name)}</h2><p>LV. ${hero.level} ${hero.job} / Power ${power()} / Defense ${defense()}<br>Weapon +${hero.weapon} / Armor +${hero.armor} / ${hero.kills} enemies defeated</p><div class="rule"></div><p><span class="kbd">A D</span> MOVE &nbsp; <span class="kbd">SPACE</span> JUMP &nbsp; <span class="kbd">J</span> ATTACK &nbsp; <span class="kbd">Q</span> SKILL<br><span class="kbd">S / DOWN + JUMP</span> DROP THROUGH &nbsp; <span class="kbd">SHIFT</span> DASH<br><span class="kbd">E</span> INTERACT &nbsp; <span class="kbd">1 2</span> POTIONS</p><div class="actions"><button class="pixel-btn primary" id="resumeGame">RESUME</button><button class="pixel-btn" id="toSelect">SAVE & CHARACTERS</button></div>`);$('resumeGame').onclick=closeModal;$('toSelect').onclick=showSelect}
  function isEditable(target){return target instanceof HTMLInputElement||target instanceof HTMLTextAreaElement||target instanceof HTMLSelectElement||target?.isContentEditable}
  function clearHeldInput(){Object.keys(keys).forEach(key=>{keys[key]=false});input.left=false;input.right=false;input.down=false}
  addEventListener('focusin',e=>{if(isEditable(e.target))clearHeldInput()});
  addEventListener('blur',clearHeldInput);
  addEventListener('keydown',e=>{if(isEditable(e.target))return;const controls=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','KeyA','KeyD','KeyW','KeyS','KeyJ','KeyX','KeyQ','KeyK','KeyE','ShiftLeft','ShiftRight','Digit1','Digit2'];if(controls.includes(e.code))e.preventDefault();keys[e.code]=true;if(e.repeat)return;if(['Space','KeyW','ArrowUp'].includes(e.code))queueJump();else if(['KeyJ','KeyX'].includes(e.code))attemptAttack();else if(['KeyQ','KeyK'].includes(e.code))attemptSkill();else if(['ShiftLeft','ShiftRight'].includes(e.code))attemptDash();else if(e.code==='KeyE')interact();else if(e.code==='Digit1')usePotion('red');else if(e.code==='Digit2')usePotion('blue');else if(e.code==='Escape')toggleMenu();else if(e.code==='KeyM'){muted=!muted;dom.muteBtn.textContent=muted?'SOUND OFF':'SOUND ON'}});addEventListener('keyup',e=>{if(isEditable(e.target))return;keys[e.code]=false});canvas.addEventListener('pointerdown',()=>{if(hero&&!paused)attemptAttack()});
  dom.mainWindow.addEventListener('click',e=>{const del=e.target.closest('[data-delete]');if(del){e.stopPropagation();confirmDelete(+del.dataset.delete);return}const load=e.target.closest('[data-load]');if(load)startHero(+load.dataset.load);const fresh=e.target.closest('[data-new]');if(fresh)showCreate(+fresh.dataset.new)});dom.menuBtn.onclick=toggleMenu;dom.muteBtn.onclick=()=>{muted=!muted;dom.muteBtn.textContent=muted?'SOUND OFF':'SOUND ON'};
  document.querySelectorAll('[data-hold]').forEach(b=>{const k=b.dataset.hold,start=e=>{e.preventDefault();input[k]=true},end=e=>{e.preventDefault();input[k]=false};b.addEventListener('pointerdown',start);b.addEventListener('pointerup',end);b.addEventListener('pointercancel',end);b.addEventListener('pointerleave',end)});document.querySelectorAll('[data-tap]').forEach(b=>b.addEventListener('pointerdown',e=>{e.preventDefault();const a=b.dataset.tap;if(a==='jump')queueJump();else if(a==='drop')dropFromPlatform();else if(a==='attack')attemptAttack();else if(a==='skill')attemptSkill();else interact()}));
  addEventListener('beforeunload',saveHero);setInterval(saveHero,10000);
  function frame(now){const dt=Math.min(.033,(now-last)/1000||0);last=now;update(dt);render();requestAnimationFrame(frame)}
  window.__LEAFBOUND_DEBUG__={snapshot:()=>hero?{name:hero.name,level:hero.level,job:hero.job,map:mapKey,x:Math.round(hero.x),y:Math.round(hero.y),onPlatform:hero.onPlatform,hp:hero.hp,mp:hero.mp,enemies:enemies.filter(e=>!e.dead).length,tiers:[0,1,2,3,4,5].map(tier=>enemies.filter(e=>!e.dead&&Math.round((610-e.floorY)/84)===tier).length),paused}:null,boost:(level=10)=>{if(!hero)return;hero.level=level;hero.hp=maxHp();hero.mp=maxMp();updateHud()},travel:k=>{if(hero&&maps[k])transitionMap(k)},save:saveHero};
  boot();
})();
